version: "3.9"

services:

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app

  backend:
    build: ./backend
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html

  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_DATABASE: motohub
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"